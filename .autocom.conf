AUTOCOMMIT_DEBOUNCE_SECONDS=30
AUTOCOMMIT_PROTECTED_BRANCHES="main master production"
AUTOCOMMIT_MIN_LINES=8
AUTOCOMMIT_PUSH=true
AUTOCOMMIT_AUTO_ADD=true
AUTOCOMMIT_IGNORE_GLOBS=".git .idea .vscode tmp logs"

# When true, project defaults run after custom rules (if any custom rule matches, built-ins are skipped).
AUTOCOMMIT_BUILTIN_PATH_RULES=true

# Optional: override commit type from paths before built-ins and diff heuristics.
# One rule per line: type:regex (ripgrep syntax). Matched against each changed path (lowercased), first match wins.
# Lines starting with # are ignored.
#
# AUTOCOMMIT_PATH_RULES=$'feat:^pkg/exporter/\nchore:^vendor/\nfix:^internal/handler/auth'
#
# Or use a heredoc after copying this file to .autocommit.conf:
# read -r -d '' AUTOCOMMIT_PATH_RULES <<'ENDPATH'
# feat:^pkg/myfeature/
# chore:^scripts/db/
# ENDPATH
